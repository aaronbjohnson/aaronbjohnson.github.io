<!DOCTYPE html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

    <link href='http://fonts.googleapis.com/css?family=Roboto:400,300' rel='stylesheet' type='text/css'>
    <link href="css/style.css" rel="stylesheet" type="text/css">

    <script src="js/helper.js"></script>

</head>
<body unresolved>
    <div class="container">
        <div id="main">
            <div class="row">
                <div class="col-xs-12 col-md-10 center-content" id="header">
                </div>
                <div class="col-xs-12 col-md-2">
                    <ul id="topContacts" class="flex-box"></ul>
                </div>
            </div>

            <div class="row">
                <div id="summary"class="col-md-12">
                </div>
            </div>

            <div class="row">
                <div class="col-md-12">
                    <hr>
                </div>
            </div>

            <div class="row">
 
            </div>



            <div style="clear: both;"></div>


            <div class="row" id = "projects">
                
            </div>



            <div class="row">
                <div id="letsConnect" class="col-md-12 dark-gray">
                    <h2 class="orange center-text">Let's Connect</h2>
                    <ul id="footerContacts" class="flex-box">
                    </ul>
                </div>
            </div>
        </div>
    </div>


    <script src="js/bower_components/Chart.js/Chart.js"></script>
    <script src="js/resumeBuilder.js"></script>
  

    <script type="text/javascript">

        if(document.getElementsByClassName("flex-item").length === 0) {
        document.getElementById("topContacts").style.display = "none";
        }
        if(document.getElementsByTagName("h1").length === 0) {
        document.getElementById("header").style.display = "none";
        }
        if(document.getElementsByClassName("work-entry").length === 0) {
        document.getElementById("workExperience").style.display = "none";
        }
        if(document.getElementsByClassName("project-entry").length === 0) {
        document.getElementById("projects").style.display = "none";
        }
        if(document.getElementsByClassName("education-entry").length === 0) {
        document.getElementById("education").style.display = "none";
        }
        if(document.getElementsByClassName("skills-entry").length === 0) {
        document.getElementById("skillStart").style.display = "none";
        }
        if(document.getElementsByClassName("flex-item").length === 0) {
        document.getElementById("letsConnect").style.display = "none";
        }
        if(document.getElementById("map") == undefined) {
        document.getElementById("mapDiv").style.display = "none";
        }
    </script>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>

<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
</body>
